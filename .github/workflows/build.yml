name: build-and-publish

# Three triggers:
#   1. Push to main affecting the Dockerfile or this workflow — rebuild
#      against the currently-pinned PRUSASLICER_REF default.
#   2. Daily 04:00 UTC schedule — check upstream releases/latest; rebuild
#      against that tag. If the tag hasn't changed, BuildKit cache makes
#      it a quick no-op rebuild + a no-op push (same digest).
#   3. workflow_dispatch with an optional tag input — for backfills,
#      release candidates, or forcing a specific version.
on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '.github/workflows/build.yml'
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      tag:
        description: 'PrusaSlicer git tag to build (e.g. version_2.9.5). Leave blank for the latest upstream release.'
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve target PrusaSlicer tag
        id: tag
        run: |
          set -euo pipefail
          INPUT_TAG="${{ inputs.tag }}"
          if [ -n "$INPUT_TAG" ]; then
            REF="$INPUT_TAG"
            REASON="workflow_dispatch input"
          else
            # GITHUB_TOKEN keeps us authenticated → 5000/h rate limit instead
            # of the 60/h anonymous cap.
            REF=$(curl -fsSL \
                    -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                    https://api.github.com/repos/prusa3d/PrusaSlicer/releases/latest \
                  | python3 -c "import json,sys; print(json.load(sys.stdin)['tag_name'])")
            REASON="latest upstream release"
          fi
          echo "Resolved PrusaSlicer tag: $REF  ($REASON)"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            PRUSASLICER_REF=${{ steps.tag.outputs.ref }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/prusaslicer:latest
            ghcr.io/${{ github.repository_owner }}/prusaslicer:${{ steps.tag.outputs.ref }}
          # Use the GHA cache backend so unchanged builds finish in
          # minutes instead of hours.
          cache-from: type=gha
          cache-to: type=gha,mode=max
